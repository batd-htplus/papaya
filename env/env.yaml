# Project defaults. Committed; never put secrets here.
# For local-only overrides, use env/env.local.yaml (gitignored).

base_url: https://www.saucedemo.com   # project base URL
youtube_url: https://www.youtube.com  # YouTube base URL
username: null                        # supplied per-test via data/ (see data/checkout.yaml)
password: null                        # supplied per-test via data/ (see data/checkout.yaml)
timeout_ms: 25000                     # per-step timeout default
viewport: 1280x720
headless: true

# Logging:
#   minimal - no run.log; snapshot/diff only on failure (default)
#   normal  - run.log; snapshot/diff only on failure
#   verbose - run.log; snapshot/diff every step
log_level: minimal
